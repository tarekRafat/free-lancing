<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Portal - Login</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&display=swap" rel="stylesheet">
    <!-- Custom CSS (compiled from SCSS) -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="d-flex flex-column vh-100">
    <nav class="navbar navbar-expand-lg  bg-white">
        <div class="container-fluid">
            <a href="#"><img src="assets/header-logo.svg" alt="Logo"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
                <ul class="navbar-nav d-flex gap-2">
                    <li class="nav-item">
                        <a class="nav-link icon-link" href="#" id="language-btn">
                            <img src="./assets/language.svg" alt="Language Icon">
                            <p>English</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-primary" id="header-login-btn">Login</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex flex-grow-1">
        <div class="p-2 d-flex align-items-center justify-content-center flex-grow-1">
            <div class="card border-light">
                <div class="card-body">
                    <form id="login-form">
                        <h2 class="mb-4 text-center" data-i18n="login.title">Healthcare Portal Login</h2>
                        <p class="text-center mb-4" data-i18n="login.loginToAccount">Login to your account</p>
                        <div class="mb-3">
                            <label for="username" class="form-label" data-i18n="login.username">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter username"
                                data-i18n-placeholder="login.usernamePlaceholder">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label" data-i18n="login.password">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter password"
                                data-i18n-placeholder="login.passwordPlaceholder">
                        </div>
                        <button type="submit" class="btn btn-primary w-100" data-i18n="login.submit">Login</button>
                    </form>
                </div>
            </div>
        </div>
        <div
            class="p-2 d-none d-md-flex flex-column gap-4 justify-content-center align-items-center ministry-bg-container">
            <div class="d-flex flex-column gap-2">
                <img src="./assets/ministry.svg" alt="Ministry Logo">
                <div>
                    <p data-i18n="ministry.supplyAndEngineeringAffairsAgency" class="text-white text-center">Supply and
                        Engineering Affairs Agency</p>
                    <p data-i18n="ministry.generalAdministrationOfPropertyFollowUp" class="text-white text-center">
                        General Administration of Property Follow-up</p>
                </div>
            </div>
            <h3 data-i18n="ministry.welcomeMessage" class="text-white text-center">Welcome to the Ministry of Health's
                geospatial platform</h3>
        </div>
    </div>

    <!-- jQuery and Bootstrap JS (local build) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <!-- compiled TypeScript output -->
    <script src="js/app.js"></script>
    <!-- custom translation script -->
    <script src="js/translations.js"></script>
</body>

</html>
