                            </div>
                        </li>
                        <li class="nav-item">

                                <p>محمد بن عبدالله الغامدي</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <div class="dropdown d-inline-block">
                                <button class="btn btn-light d-flex align-items-center gap-2 border shadow-sm"
                                    type="button" data-bs-toggle="dropdown">
                                    <img src="./assets/notification.svg" alt="Notification Icon">
                                    <span class="fw-normal" data-i18n="home.notification">Notification</span>
                                </button>

                                <!-- Dropdown Menu Content -->
                                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"

            <div>

                        <div class="d-flex justify-content-center gap-3">

                            <button class="btn btn-primary">
                                <img src="./assets/plus.svg" alt="Plus Icon">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-3">

                    <div class="card border-light card-body" style="width: 350px;">

                        </div>

                        <div class="accordion accordion-flush" id="accordionFlushExample">
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseOne" aria-expanded="false"
                                        aria-controls="flush-collapseOne">
                                        الطبقات الأساسية
                                    </button>
                                </h2>
                                <div id="flush-collapseOne" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionFlushExample">
                                    <div class="accordion-body">content</div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"

                                    </button>
                                </h2>
                                <div id="flush-collapseTwo" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionFlushExample">
                                    <div class="accordion-body">content</div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseThree" aria-expanded="false"
                                        aria-controls="flush-collapseThree">
                                        طبقات المستخدم
                                    </button>
                                </h2>
                                <div id="flush-collapseThree" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionFlushExample">
                                    <div class="accordion-body">content</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


                <div class="card border-light">
                    <div class="card-body">
                        <div class="d-flex flex-column align-items-center justify-content-center gap-3">
                            <div>
                                <img src="./assets/geo-health.svg" alt="geo-health">
                            </div>
                            <div class="card overflow-hidden">
                                <div class="p-2 bg-primary cursor-pointer" data-bs-toggle="collapse"
                                        data-bs-target="#collapseWidthExample" aria-expanded="false"
                                        aria-controls="collapseWidthExample">
                                    <img src="./assets/database.svg" alt="Database Icon" >

                            </div>
                            <div class="card">
                                <div class="p-2">

                            </div>

                                    <img src="./assets/info.svg" alt="Info Icon">
                                </div>
                            </div>

                                    <img src="./assets/ruler.svg" alt="Ruler Icon">
                                </div>
                            </div>

                                </div>
                            </div>

                                    <img src="./assets/analytics.svg" alt="Analytics Icon">

                            </div>
                            <div class="card">
                                <div class="p-2">
                                    <img src="./assets/camera.svg" alt="Camera Icon">
                                </div>
                            </div>
                            <div class="card">
                                <div class="p-2">
                                    <img src="./assets/layers.svg" alt="Layers Icon">
                                </div>
                            </div>
